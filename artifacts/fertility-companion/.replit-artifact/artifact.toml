kind = "web"
previewPath = "/"
title = "Fertility Companion"
version = "1.0.0"
id = "artifacts/fertility-companion"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25754

[services.development]
run = "pnpm --filter @workspace/fertility-companion run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fertility-companion", "run", "build" ]
publicDir = "artifacts/fertility-companion/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25754"
BASE_PATH = "/"
